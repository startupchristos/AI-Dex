# Strategic Pillars Configuration
# 
# Pillars are your main focus areas — think of them as how you carve up your life thematically.
# These are NOT time-bound (like quarterly goals). They represent ongoing domains of
# responsibility that typically stay consistent for 6-12+ months.
#
# PILLAR (ongoing):             GOAL (time-bound):
# "Engagements"          vs    "Deliver Cognome ExplainerAI roadmap Q1"
# "Professional"         vs    "Publish 8 LinkedIn posts by March"
# "Body, Mind & Spirit"  vs    "Run 10K by April"
#
# Want to change your pillars? Just chat with Claude: "I need to reconfigure my strategic pillars"
# — it'll help you update how your work ladders up to new focus areas.
#
# The Work MCP uses these to categorize tasks and check balance across your life.

pillars:
